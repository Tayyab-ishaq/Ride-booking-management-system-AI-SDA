<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RideFlow - Smart Booking</title>
  <style>
    html, body { height: 100%; margin: 0; background-color: #0b0e14; }
    #root { height: 100%; }

    /* This CSS block forces the bubble to be Green and the Title to be Large */
    :root {
      --n8n-chat-primary-color: #2ecc71 !important;
    }

    /* Force the button to not be pink */
    .n8n-chat-button {
      background-color: #2ecc71 !important;
      box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3) !important;
    }

    .n8n-chat-widget { z-index: 999999 !important; }
  </style>
  <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>

  <script type="module">
    // The ?v=1 at the end forces the browser to download the NEWEST version
    import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js?v=1';

    createChat({
      webhookUrl: 'http://localhost:5678/webhook/8c119f33-bf09-43f5-88f7-67160f052ab2/chat',
      title: '🚗 RIDE FLOW',
      subtitle: 'Modernizing Ride Booking',
      welcomeMessage: 'I am RideFlow. How can I assist you today?',
      backgroundColor: '#1a1c23',
      mainColor: '#2ecc71',
      bubbleColor: '#2ecc71', // Overrides the pink bubble
      iFrameCustomStyle: `
        .chat-header-title { 
          font-size: 26px !important; 
          font-weight: 800 !important; 
          color: #2ecc71 !important; 
          display: block !important;
        }
        .chat-message-bot { 
          background-color: #2c3e50 !important; 
          color: white !important; 
          font-size: 14px !important;
        }
        .chat-message-user { 
          background-color: #2ecc71 !important; 
          color: black !important; 
          font-weight: bold !important;
        }
      `
    });
  </script>
</body>
</html>
